version: "3.9"

services:
  # 1. Global Reverse Proxy (Nginx)
  nginx:
    container_name: nginx
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"   # HTTP
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - client
      - server


  # 3. Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-backend:latest}
    container_name: backend_server
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

  # 4. SES Mailer Service
  ses-mailer:
    build:
      context: ./ses-mailer
      dockerfile: Dockerfile
    image: ${SES_IMAGE:-ses-mailer:latest}
    container_name: ses_mailer
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

  # 5. Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-300308332418-10857pf01ct3q1ihplql5fjucn7ct08q.apps.googleusercontent.com}
        # In prod, this should be the public URL
        VITE_API_BASE_URL: http://${DOMAIN:-new551.duckdns.org}
    image: ${FRONTEND_IMAGE:-frontend:latest}
    container_name: frontend_client
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - server

networks:
  app-network:
    driver: bridge